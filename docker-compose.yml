version: "3.9"
services:
  # 데이터베이스
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: backend-api-server
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      backend-network:
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d backend-api-server"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 캐시
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      backend-network:
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 백엔드
  backend-proxy-server:
    image: ghcr.io/dev-montyoh/backend-proxy-server:latest
    container_name: backend-proxy-server
    ports:
      - "80:80"
    networks:
      backend-network:
    restart: always

  # gateway
  backend-api-server-gateway:
    image: ghcr.io/dev-montyoh/backend-api-server-gateway:latest
    container_name: backend-api-server-gateway
    networks:
      backend-network:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MCP_JWT_SECRET_KEY: ${MCP_JWT_SECRET_KEY}
      SERVER_PORT: 80

  # auth
  backend-api-server-auth:
    image: ghcr.io/dev-montyoh/backend-api-server-auth:latest
    container_name: backend-api-server-auth
    networks:
      backend-network:
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 80
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MCP_JWT_SECRET_KEY: ${MCP_JWT_SECRET_KEY}

  # content
  backend-api-server-content:
    image: ghcr.io/dev-montyoh/backend-api-server-content:latest
    container_name: backend-api-server-content
    ports:
      - "3002:3002"
    networks:
      backend-network:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_ACCESS_KEY: ${CLOUDFLARE_ACCESS_KEY}
      CLOUDFLARE_SECRET_KEY: ${CLOUDFLARE_SECRET_KEY}
      CLOUDFLARE_R2_END_POINT: ${CLOUDFLARE_R2_END_POINT}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME}

  # user
  backend-api-server-user:
    image: ghcr.io/dev-montyoh/backend-api-server-user:latest
    container_name: backend-api-server-user
    networks:
      backend-network:
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 80
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_LOGIN_ID: ${ADMIN_LOGIN_ID}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

  # payment
  backend-api-server-payment:
    image: ghcr.io/dev-montyoh/backend-api-server-payment:latest
    container_name: backend-api-server-payment
    networks:
      backend-network:
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 80
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      PAYMENT_INICIS_SIGN_KEY: ${PAYMENT_INICIS_SIGN_KEY}
      PAYMENT_INICIS_MID: ${PAYMENT_INICIS_MID}
      PAYMENT_INICIS_INIAPIKEY: ${PAYMENT_INICIS_INIAPIKEY}
      PAYMENT_NICEPAY_MERCHANT_KEY: ${PAYMENT_NICEPAY_MERCHANT_KEY}
      PAYMENT_NICEPAY_MID: ${PAYMENT_NICEPAY_MID}

  # xcelerate 데모
  xcelerate-demo:
    image: ghcr.io/dev-montyoh/xcelerate-demo:latest
    container_name: xcelerate-demo
    ports:
      - "8082:8080"
    networks:
      backend-network:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      XCELERATE_DB_URL: ${XCELERATE_DB_URL}
      XCELERATE_DB_USERNAME: ${XCELERATE_DB_USERNAME}
      XCELERATE_DB_PASSWORD: ${XCELERATE_DB_PASSWORD}
    volumes:
      - xcelerate_data:/app/data

  # 프론트
  frontend-portfolio:
    image: ghcr.io/dev-montyoh/frontend-portfolio:latest
    container_name: frontend-portfolio
    networks:
      backend-network:
    restart: always
    environment:
      PORT: 80
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  frontend-payment:
    image: ghcr.io/dev-montyoh/frontend-payment:latest
    container_name: frontend-payment
    networks:
      backend-network:
    restart: always
    environment:
      PORT: 80

  # ── Vikunja (할 일 / 프로젝트 관리) ─────────────────────────────
  vikunja:
    image: vikunja/vikunja:latest
    container_name: vikunja
    environment:
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: postgres
      VIKUNJA_DATABASE_DATABASE: ${VIKUNJA_DB_NAME}
      VIKUNJA_DATABASE_USER: ${VIKUNJA_DB_USERNAME}
      VIKUNJA_DATABASE_PASSWORD: ${VIKUNJA_DB_PASSWORD}
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_JWT_SECRET}
      VIKUNJA_SERVICE_PUBLICURL: https://vikunja.montyoh.dev/
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "false"
      VIKUNJA_SERVICE_CUSTOMLOGOURL: ${VIKUNJA_CUSTOM_LOGO_URL}
      VIKUNJA_FILES_TYPE: s3
      VIKUNJA_FILES_S3_ENDPOINT: ${CLOUDFLARE_R2_END_POINT}
      VIKUNJA_FILES_S3_BUCKET: ${VIKUNJA_R2_BUCKET}
      VIKUNJA_FILES_S3_REGION: auto
      VIKUNJA_FILES_S3_ACCESSKEY: ${VIKUNJA_R2_ACCESS_KEY}
      VIKUNJA_FILES_S3_SECRETKEY: ${VIKUNJA_R2_SECRET_KEY}
      VIKUNJA_FILES_S3_USEPATHSTYLE: "true"
    networks:
      backend-network:
        aliases:
          - vikunja
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  # ── Vikunja MCP (커스텀 MCP 서버 + supergateway 번들, stdio→SSE 변환) ────
  vikunja-mcp:
    image: ghcr.io/dev-montyoh/vikunja-mcp:latest
    container_name: vikunja-mcp
    environment:
      VIKUNJA_URL: http://vikunja:3456/api/v1
      VIKUNJA_TOKEN: ${VIKUNJA_API_TOKEN}
      BASE_URL: https://www.montyoh.dev/api/mcp/vikunja
    networks:
      backend-network:
        aliases:
          - vikunja-mcp
    depends_on:
      - vikunja
    restart: always

networks:
  backend-network:
    driver: bridge

volumes:
  xcelerate_data:
  postgres_data:
  redis_data:
