version: "3.9"
services:
  # 데이터베이스
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: backend-api-server
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      backend-network:
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d backend-api-server"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 캐시
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      backend-network:
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 백엔드
  backend-proxy-server:
    image: ghcr.io/dev-montyoh/backend-proxy-server:latest
    container_name: backend-proxy-server
    ports:
      - "80:80"
    networks:
      backend-network:
    restart: always

  # gateway
  backend-api-server-gateway:
    image: ghcr.io/dev-montyoh/backend-api-server-gateway:latest
    container_name: backend-api-server-gateway
    networks:
      backend-network:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SERVER_PORT: 80

  # auth
  backend-api-server-auth:
    image: ghcr.io/dev-montyoh/backend-api-server-auth:latest
    container_name: backend-api-server-auth
    ports:
      - "3001:3001"
    networks:
      backend-network:
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

  # content
  backend-api-server-content:
    image: ghcr.io/dev-montyoh/backend-api-server-content:latest
    container_name: backend-api-server-content
    ports:
      - "3002:3002"
    networks:
      backend-network:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_ACCESS_KEY: ${CLOUDFLARE_ACCESS_KEY}
      CLOUDFLARE_SECRET_KEY: ${CLOUDFLARE_SECRET_KEY}
      CLOUDFLARE_R2_END_POINT: ${CLOUDFLARE_R2_END_POINT}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME}

  # payment
  backend-api-server-payment:
    image: ghcr.io/dev-montyoh/backend-api-server-payment:latest
    container_name: backend-api-server-payment
    ports:
      - "3003:3003"
    networks:
      backend-network:
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      PAYMENT_INICIS_SIGN_KEY: ${PAYMENT_INICIS_SIGN_KEY}
      PAYMENT_INICIS_MID: ${PAYMENT_INICIS_MID}
      PAYMENT_INICIS_INIAPIKEY: ${PAYMENT_INICIS_INIAPIKEY}
      PAYMENT_NICEPAY_MERCHANT_KEY: ${PAYMENT_NICEPAY_MERCHANT_KEY}
      PAYMENT_NICEPAY_MID: ${PAYMENT_NICEPAY_MID}

  # xcelerate 데모
  xcelerate-demo:
    image: ghcr.io/dev-montyoh/xcelerate-demo:latest
    container_name: xcelerate-demo
    ports:
      - "8082:8080"
    networks:
      backend-network:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      XCELERATE_DB_URL: ${XCELERATE_DB_URL}
      XCELERATE_DB_USERNAME: ${XCELERATE_DB_USERNAME}
      XCELERATE_DB_PASSWORD: ${XCELERATE_DB_PASSWORD}
    volumes:
      - xcelerate_data:/app/data

  # 프론트
  frontend-portfolio:
    image: ghcr.io/dev-montyoh/frontend-portfolio:latest
    container_name: frontend-portfolio
    networks:
      backend-network:
    restart: always
    environment:
      PORT: 80
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  frontend-payment:
    image: ghcr.io/dev-montyoh/frontend-payment:latest
    container_name: frontend-payment
    networks:
      backend-network:
    restart: always
    environment:
      PORT: 80

  # ── Plane (이슈 트래킹) ──────────────────────────────────────────
  plane-minio:
    image: minio/minio:latest
    container_name: plane-minio
    command: server /export --console-address ":9090"
    environment:
      MINIO_ROOT_USER: ${PLANE_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${PLANE_MINIO_ROOT_PASSWORD}
    volumes:
      - plane_minio_data:/export
    networks:
      backend-network:
        aliases:
          - minio
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  plane-createbuckets:
    image: minio/mc:latest
    container_name: plane-createbuckets
    depends_on:
      plane-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://plane-minio:9000 ${PLANE_MINIO_ROOT_USER} ${PLANE_MINIO_ROOT_PASSWORD};
      mc mb myminio/${PLANE_MINIO_BUCKET} --ignore-existing;
      mc anonymous set download myminio/${PLANE_MINIO_BUCKET};
      exit 0;
      "
    networks:
      backend-network:
    restart: on-failure

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    container_name: plane-mq
    environment:
      RABBITMQ_DEFAULT_USER: ${PLANE_RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${PLANE_RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${PLANE_RABBITMQ_VHOST}
    volumes:
      - plane_rabbitmq_data:/var/lib/rabbitmq
    networks:
      backend-network:
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  plane-migrator:
    image: makeplane/plane-backend:stable
    container_name: plane-migrator
    command: ./bin/docker-entrypoint-migrator.sh
    environment:
      DATABASE_URL: postgresql://${PLANE_DB_USERNAME}:${PLANE_DB_PASSWORD}@postgres/${PLANE_DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: ${PLANE_WEB_URL}
      AMQP_URL: amqp://${PLANE_RABBITMQ_USER}:${PLANE_RABBITMQ_PASSWORD}@plane-mq:5672/${PLANE_RABBITMQ_VHOST}
      USE_MINIO: "1"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${PLANE_MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${PLANE_MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT_URL: http://plane-minio:9000
      AWS_S3_BUCKET_NAME: ${PLANE_MINIO_BUCKET}
      MINIO_ENDPOINT_SSL: ${PLANE_MINIO_ENDPOINT_SSL}
    depends_on:
      postgres:
        condition: service_healthy
      plane-mq:
        condition: service_healthy
    networks:
      backend-network:
    restart: on-failure

  plane-api:
    image: makeplane/plane-backend:stable
    container_name: plane-api
    command: ./bin/docker-entrypoint-api.sh
    environment:
      DATABASE_URL: postgresql://${PLANE_DB_USERNAME}:${PLANE_DB_PASSWORD}@postgres/${PLANE_DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: ${PLANE_WEB_URL}
      CORS_ALLOWED_ORIGINS: ${PLANE_WEB_URL}
      AMQP_URL: amqp://${PLANE_RABBITMQ_USER}:${PLANE_RABBITMQ_PASSWORD}@plane-mq:5672/${PLANE_RABBITMQ_VHOST}
      GUNICORN_WORKERS: "2"
      FILE_SIZE_LIMIT: "5242880"
      USE_MINIO: "1"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${PLANE_MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${PLANE_MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT_URL: http://plane-minio:9000
      AWS_S3_BUCKET_NAME: ${PLANE_MINIO_BUCKET}
      MINIO_ENDPOINT_SSL: ${PLANE_MINIO_ENDPOINT_SSL}
      LIVE_SERVER_SECRET_KEY: ${PLANE_LIVE_SERVER_SECRET_KEY}
    depends_on:
      plane-migrator:
        condition: service_completed_successfully
      plane-mq:
        condition: service_healthy
    networks:
      backend-network:
        aliases:
          - api
    restart: always

  plane-worker:
    image: makeplane/plane-backend:stable
    container_name: plane-worker
    command: ./bin/docker-entrypoint-worker.sh
    environment:
      DATABASE_URL: postgresql://${PLANE_DB_USERNAME}:${PLANE_DB_PASSWORD}@postgres/${PLANE_DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: ${PLANE_WEB_URL}
      AMQP_URL: amqp://${PLANE_RABBITMQ_USER}:${PLANE_RABBITMQ_PASSWORD}@plane-mq:5672/${PLANE_RABBITMQ_VHOST}
      USE_MINIO: "1"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${PLANE_MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${PLANE_MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT_URL: http://plane-minio:9000
      AWS_S3_BUCKET_NAME: ${PLANE_MINIO_BUCKET}
      MINIO_ENDPOINT_SSL: ${PLANE_MINIO_ENDPOINT_SSL}
      LIVE_SERVER_SECRET_KEY: ${PLANE_LIVE_SERVER_SECRET_KEY}
    depends_on:
      plane-api:
        condition: service_started
      plane-mq:
        condition: service_healthy
    networks:
      backend-network:
    restart: always

  plane-beat-worker:
    image: makeplane/plane-backend:stable
    container_name: plane-beat-worker
    command: ./bin/docker-entrypoint-beat.sh
    environment:
      DATABASE_URL: postgresql://${PLANE_DB_USERNAME}:${PLANE_DB_PASSWORD}@postgres/${PLANE_DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: ${PLANE_WEB_URL}
      AMQP_URL: amqp://${PLANE_RABBITMQ_USER}:${PLANE_RABBITMQ_PASSWORD}@plane-mq:5672/${PLANE_RABBITMQ_VHOST}
      LIVE_SERVER_SECRET_KEY: ${PLANE_LIVE_SERVER_SECRET_KEY}
    depends_on:
      plane-api:
        condition: service_started
      plane-mq:
        condition: service_healthy
    networks:
      backend-network:
    restart: always

  plane-live:
    image: makeplane/plane-live:stable
    container_name: plane-live
    environment:
      API_BASE_URL: http://api:8000
      LIVE_SERVER_SECRET_KEY: ${PLANE_LIVE_SERVER_SECRET_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      plane-api:
        condition: service_started
    networks:
      backend-network:
        aliases:
          - live
    restart: always

  plane-admin:
    image: makeplane/plane-admin:stable
    container_name: plane-admin
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PLANE_WEB_URL}
      NEXT_PUBLIC_ADMIN_BASE_URL: ${PLANE_WEB_URL}
    depends_on:
      plane-api:
        condition: service_started
    networks:
      backend-network:
        aliases:
          - admin
    restart: always

  plane-space:
    image: makeplane/plane-space:stable
    container_name: plane-space
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PLANE_WEB_URL}
      NEXT_PUBLIC_SPACE_BASE_URL: ${PLANE_WEB_URL}
    depends_on:
      plane-api:
        condition: service_started
    networks:
      backend-network:
        aliases:
          - space
    restart: always

  plane-web:
    image: makeplane/plane-frontend:stable
    container_name: plane-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PLANE_WEB_URL}
      NEXT_PUBLIC_WEB_BASE_URL: ${PLANE_WEB_URL}
    depends_on:
      plane-api:
        condition: service_started
    networks:
      backend-network:
        aliases:
          - web
    restart: always

  plane-proxy:
    image: makeplane/plane-proxy:stable
    container_name: plane-proxy
    environment:
      FILE_SIZE_LIMIT: "5242880"
      BUCKET_NAME: ${PLANE_MINIO_BUCKET}
      SITE_ADDRESS: ":80"
    depends_on:
      plane-web:
        condition: service_started
      plane-api:
        condition: service_started
    networks:
      backend-network:
    restart: always

  # ── Vikunja (할 일 / 프로젝트 관리) ─────────────────────────────
  vikunja:
    image: vikunja/vikunja:latest
    container_name: vikunja
    environment:
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: postgres
      VIKUNJA_DATABASE_DATABASE: ${VIKUNJA_DB_NAME}
      VIKUNJA_DATABASE_USER: ${VIKUNJA_DB_USERNAME}
      VIKUNJA_DATABASE_PASSWORD: ${VIKUNJA_DB_PASSWORD}
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_JWT_SECRET}
      VIKUNJA_SERVICE_PUBLICURL: https://vikunja.montyoh.dev/
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "false"
      VIKUNJA_SERVICE_CUSTOMLOGOURL: ${VIKUNJA_CUSTOM_LOGO_URL}
      VIKUNJA_FILES_TYPE: s3
      VIKUNJA_FILES_S3_ENDPOINT: ${CLOUDFLARE_R2_END_POINT}
      VIKUNJA_FILES_S3_BUCKET: ${PLANE_R2_BUCKET}
      VIKUNJA_FILES_S3_REGION: auto
      VIKUNJA_FILES_S3_ACCESSKEY: ${PLANE_R2_ACCESS_KEY}
      VIKUNJA_FILES_S3_SECRETKEY: ${PLANE_R2_SECRET_KEY}
      VIKUNJA_FILES_S3_USEPATHSTYLE: "true"
    networks:
      backend-network:
        aliases:
          - vikunja
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

networks:
  backend-network:
    driver: bridge

volumes:
  xcelerate_data:
  postgres_data:
  redis_data:
  plane_rabbitmq_data:
  plane_minio_data:
