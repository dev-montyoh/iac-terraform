version: "3.9"
services:
  # 데이터베이스
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: backend-api-server
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      backend-network:
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d backend-api-server"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 캐시
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      backend-network:
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 백엔드
  backend-proxy-server:
    image: ghcr.io/dev-montyoh/backend-proxy-server:latest
    container_name: backend-proxy-server
    ports:
      - "80:80"
    networks:
      backend-network:
    restart: always

  # gateway
  backend-api-server-gateway:
    image: ghcr.io/dev-montyoh/backend-api-server-gateway:latest
    container_name: backend-api-server-gateway
    networks:
      backend-network:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SERVER_PORT: 80

  # auth
  backend-api-server-auth:
    image: ghcr.io/dev-montyoh/backend-api-server-auth:latest
    container_name: backend-api-server-auth
    ports:
      - "3001:3001"
    networks:
      backend-network:
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

  # content
  backend-api-server-content:
    image: ghcr.io/dev-montyoh/backend-api-server-content:latest
    container_name: backend-api-server-content
    ports:
      - "3002:3002"
    networks:
      backend-network:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_ACCESS_KEY: ${CLOUDFLARE_ACCESS_KEY}
      CLOUDFLARE_SECRET_KEY: ${CLOUDFLARE_SECRET_KEY}
      CLOUDFLARE_R2_END_POINT: ${CLOUDFLARE_R2_END_POINT}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME}

  # payment
  backend-api-server-payment:
    image: ghcr.io/dev-montyoh/backend-api-server-payment:latest
    container_name: backend-api-server-payment
    ports:
      - "3003:3003"
    networks:
      backend-network:
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      PAYMENT_INICIS_SIGN_KEY: ${PAYMENT_INICIS_SIGN_KEY}
      PAYMENT_INICIS_MID: ${PAYMENT_INICIS_MID}
      PAYMENT_INICIS_INIAPIKEY: ${PAYMENT_INICIS_INIAPIKEY}
      PAYMENT_NICEPAY_MERCHANT_KEY: ${PAYMENT_NICEPAY_MERCHANT_KEY}
      PAYMENT_NICEPAY_MID: ${PAYMENT_NICEPAY_MID}

  # xcelerate 데모
  xcelerate-demo:
    image: ghcr.io/dev-montyoh/xcelerate-demo:latest
    container_name: xcelerate-demo
    ports:
      - "8082:8080"
    networks:
      backend-network:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      XCELERATE_DB_URL: ${XCELERATE_DB_URL}
      XCELERATE_DB_USERNAME: ${XCELERATE_DB_USERNAME}
      XCELERATE_DB_PASSWORD: ${XCELERATE_DB_PASSWORD}
    volumes:
      - xcelerate_data:/app/data

  # 프론트
  frontend-portfolio:
    image: ghcr.io/dev-montyoh/frontend-portfolio:latest
    container_name: frontend-portfolio
    networks:
      backend-network:
    restart: always
    environment:
      PORT: 80
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  frontend-payment:
    image: ghcr.io/dev-montyoh/frontend-payment:latest
    container_name: frontend-payment
    networks:
      backend-network:
    restart: always
    environment:
      PORT: 80

  # ── Plane (이슈 트래킹) ──────────────────────────────────────────
  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    container_name: plane-mq
    environment:
      RABBITMQ_DEFAULT_USER: ${PLANE_RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${PLANE_RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${PLANE_RABBITMQ_VHOST}
    volumes:
      - plane_rabbitmq_data:/var/lib/rabbitmq
    networks:
      backend-network:
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  plane-migrator:
    image: makeplane/plane-backend:stable
    container_name: plane-migrator
    command: ./bin/docker-entrypoint-migrator.sh
    environment:
      POSTGRES_USER: ${PLANE_DB_USERNAME}
      POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD}
      POSTGRES_DB: ${PLANE_DB_NAME}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: ${PLANE_WEB_URL}
      RABBITMQ_HOST: plane-mq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${PLANE_RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${PLANE_RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${PLANE_RABBITMQ_VHOST}
    depends_on:
      postgres:
        condition: service_healthy
      plane-mq:
        condition: service_healthy
    networks:
      backend-network:
    restart: on-failure

  plane-api:
    image: makeplane/plane-backend:stable
    container_name: plane-api
    command: ./bin/docker-entrypoint-api.sh
    environment:
      POSTGRES_USER: ${PLANE_DB_USERNAME}
      POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD}
      POSTGRES_DB: ${PLANE_DB_NAME}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: ${PLANE_WEB_URL}
      CORS_ALLOWED_ORIGINS: ${PLANE_WEB_URL}
      GUNICORN_WORKERS: "2"
      FILE_SIZE_LIMIT: "5242880"
      USE_MINIO: "0"
      AWS_REGION: auto
      AWS_ACCESS_KEY_ID: ${PLANE_R2_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${PLANE_R2_SECRET_KEY}
      AWS_S3_ENDPOINT_URL: ${CLOUDFLARE_R2_END_POINT}
      AWS_S3_BUCKET_NAME: ${PLANE_R2_BUCKET}
      RABBITMQ_HOST: plane-mq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${PLANE_RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${PLANE_RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${PLANE_RABBITMQ_VHOST}
    depends_on:
      plane-migrator:
        condition: service_completed_successfully
      plane-mq:
        condition: service_healthy
    networks:
      backend-network:
    restart: always

  plane-worker:
    image: makeplane/plane-backend:stable
    container_name: plane-worker
    command: ./bin/docker-entrypoint-worker.sh
    environment:
      POSTGRES_USER: ${PLANE_DB_USERNAME}
      POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD}
      POSTGRES_DB: ${PLANE_DB_NAME}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: ${PLANE_WEB_URL}
      USE_MINIO: "0"
      AWS_REGION: auto
      AWS_ACCESS_KEY_ID: ${PLANE_R2_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${PLANE_R2_SECRET_KEY}
      AWS_S3_ENDPOINT_URL: ${CLOUDFLARE_R2_END_POINT}
      AWS_S3_BUCKET_NAME: ${PLANE_R2_BUCKET}
      RABBITMQ_HOST: plane-mq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${PLANE_RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${PLANE_RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${PLANE_RABBITMQ_VHOST}
    depends_on:
      plane-api:
        condition: service_started
      plane-mq:
        condition: service_healthy
    networks:
      backend-network:
    restart: always

  plane-beat-worker:
    image: makeplane/plane-backend:stable
    container_name: plane-beat-worker
    command: ./bin/docker-entrypoint-beat.sh
    environment:
      POSTGRES_USER: ${PLANE_DB_USERNAME}
      POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD}
      POSTGRES_DB: ${PLANE_DB_NAME}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: ${PLANE_WEB_URL}
      RABBITMQ_HOST: plane-mq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${PLANE_RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${PLANE_RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${PLANE_RABBITMQ_VHOST}
    depends_on:
      plane-api:
        condition: service_started
      plane-mq:
        condition: service_healthy
    networks:
      backend-network:
    restart: always

  plane-web:
    image: makeplane/plane-frontend:stable
    container_name: plane-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PLANE_WEB_URL}
      NEXT_PUBLIC_WEB_BASE_URL: ${PLANE_WEB_URL}
    depends_on:
      plane-api:
        condition: service_started
    networks:
      backend-network:
    restart: always

  plane-proxy:
    image: makeplane/plane-proxy:stable
    container_name: plane-proxy
    ports:
      - "8080:80"
    environment:
      FILE_SIZE_LIMIT: "5242880"
      BUCKET_NAME: ${PLANE_R2_BUCKET}
    depends_on:
      plane-web:
        condition: service_started
      plane-api:
        condition: service_started
    networks:
      backend-network:
    restart: always

networks:
  backend-network:
    driver: bridge

volumes:
  xcelerate_data:
  postgres_data:
  redis_data:
  plane_rabbitmq_data:
