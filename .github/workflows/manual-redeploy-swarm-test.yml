name: manual-redeploy-swarm-test

on:
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check out Secrets store
        uses: actions/checkout@v5
        with:
          repository: 'dev-montyoh/secrets-store'
          token: ${{ secrets.SECRETS_STORE_ACCESS_TOKEN }}
          path: secrets-store

      - name: Load secrets
        uses: ./secrets-store/.github/actions/load-secrets
        with:
          SECRETS_STORE_ACCESS_TOKEN: ${{ secrets.SECRETS_STORE_ACCESS_TOKEN }}

      - name: ENV to JSON
        id: set_env_json
        run: |
          echo "ENV_VARS_JSON=$(echo '${{ toJSON(env) }}' | jq -c '.')" >> $GITHUB_OUTPUT

      - name: Deploy Swarm test stack to Oracle
        uses: appleboy/ssh-action@v1
        with:
          host: ssh.montyoh.dev
          username: ubuntu
          key_path: ./secrets-store/key/ec2-ssh-key
          script: |
            ENV_JSON='${{ steps.set_env_json.outputs.ENV_VARS_JSON }}'
            eval $(echo "$ENV_JSON" | jq -r '
              to_entries[]
              | select((.key | startswith("GITHUB_") | not) and (.key | startswith("RUNNER_") | not))
              | "export \(.key)=\"\(.value)\";"
            ' | tr -d '\n')

            # Swarm 모드 활성화 (이미 active면 스킵 — 멱등)
            if [ "$(docker info --format '{{.Swarm.LocalNodeState}}')" != "active" ]; then
              docker swarm init --advertise-addr "$(hostname -I | awk '{print $1}')"
            fi

            # GHCR 재로그인 (비공개 이미지 pull + --with-registry-auth 대비)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u dev-montyoh --password-stdin

            cd /home/ubuntu/app
            curl -L -o docker-compose.swarm-test.yml https://raw.githubusercontent.com/${{ github.repository_owner }}/iac-terraform/refs/heads/master/docker-compose.swarm-test.yml

            # 스택 배포 (--with-registry-auth: 로그인 정보를 swarm 노드로 전달)
            docker stack deploy --with-registry-auth -c docker-compose.swarm-test.yml swarm-test

            # 배포 상태 확인
            docker stack services swarm-test
