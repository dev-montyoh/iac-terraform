name: manual-redeploy-vikunja

on:
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check out Secrets store
        uses: actions/checkout@v5
        with:
          repository: 'dev-montyoh/secrets-store'
          token: ${{ secrets.SECRETS_STORE_ACCESS_TOKEN }}
          path: secrets-store

      - name: Load secrets
        uses: ./secrets-store/.github/actions/load-secrets
        with:
          SECRETS_STORE_ACCESS_TOKEN: ${{ secrets.SECRETS_STORE_ACCESS_TOKEN }}

      - name: ENV to JSON
        id: set_env_json
        run: |
          echo "ENV_VARS_JSON=$(echo '${{ toJSON(env) }}' | jq -c '.')" >> $GITHUB_OUTPUT

      - name: Backup Vikunja before deploy
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="/tmp/vikunja-backup-$TIMESTAMP.zip"

          echo "[$(date)] Getting JWT token..."
          JWT=$(curl -s -X POST "https://vikunja.montyoh.dev/api/v1/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$VIKUNJA_BACKUP_USERNAME\",\"password\":\"$VIKUNJA_BACKUP_PASSWORD\"}" \
            | jq -r '.token')

          echo "[$(date)] Requesting export..."
          curl -s -X POST "https://vikunja.montyoh.dev/api/v1/user/export/request" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"password\":\"$VIKUNJA_BACKUP_PASSWORD\"}"

          echo "[$(date)] Waiting for export to be ready..."
          for i in $(seq 1 12); do
            sleep 10
            HTTP_CODE=$(curl -s -X POST "https://vikunja.montyoh.dev/api/v1/user/export/download" \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              -d "{\"password\":\"$VIKUNJA_BACKUP_PASSWORD\"}" \
              -o "$BACKUP_FILE" \
              -w "%{http_code}")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "[$(date)] Export ready."
              break
            fi
            echo "Not ready yet ($i/12), retrying..."
            rm -f "$BACKUP_FILE"
          done

          echo "[$(date)] Uploading to R2..."
          AWS_ACCESS_KEY_ID=$VIKUNJA_R2_ACCESS_KEY \
          AWS_SECRET_ACCESS_KEY=$VIKUNJA_R2_SECRET_KEY \
          aws s3 cp "$BACKUP_FILE" \
            "s3://$VIKUNJA_R2_BUCKET/backup/vikunja-backup-$TIMESTAMP.zip" \
            --endpoint-url "$CLOUDFLARE_R2_END_POINT" \
            --region auto

          rm -f "$BACKUP_FILE"
          echo "[$(date)] Backup complete: vikunja-backup-$TIMESTAMP.zip"

      - name: Redeploy Vikunja to Oracle
        uses: appleboy/ssh-action@v1
        with:
          host: ssh.montyoh.dev
          username: ubuntu
          key_path: ./secrets-store/key/ec2-ssh-key
          script: |
            ENV_JSON='${{ steps.set_env_json.outputs.ENV_VARS_JSON }}'
            eval $(echo "$ENV_JSON" | jq -r '
              to_entries[]
              | select((.key | startswith("GITHUB_") | not) and (.key | startswith("RUNNER_") | not))
              | "export \(.key)=\"\(.value)\";"
            ' | tr -d '\n')

            docker stop vikunja || true
            docker rm vikunja || true

            cd /home/ubuntu/app
            curl -L -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository_owner }}/iac-terraform/refs/heads/master/docker-compose.yml

            # Vikunja 전용 유저 생성 (없을 경우에만)
            docker exec postgres psql -U "$DB_USERNAME" -d postgres -c \
              "DO \$\$ BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='$VIKUNJA_DB_USERNAME') THEN
                  CREATE USER \"$VIKUNJA_DB_USERNAME\" WITH PASSWORD '$VIKUNJA_DB_PASSWORD';
                END IF;
              END \$\$;"

            # Vikunja 전용 DB 생성 (없을 경우에만)
            docker exec postgres psql -U "$DB_USERNAME" -d postgres -tc \
              "SELECT 1 FROM pg_database WHERE datname='$VIKUNJA_DB_NAME'" | grep -q 1 \
              || docker exec postgres psql -U "$DB_USERNAME" -d postgres -c \
                "CREATE DATABASE \"$VIKUNJA_DB_NAME\" OWNER \"$VIKUNJA_DB_USERNAME\";"

            # 권한 부여
            docker exec postgres psql -U "$DB_USERNAME" -d postgres -c \
              "GRANT ALL PRIVILEGES ON DATABASE \"$VIKUNJA_DB_NAME\" TO \"$VIKUNJA_DB_USERNAME\";"

            docker-compose up -d vikunja

      - name: Register backup cron
        uses: appleboy/ssh-action@v1
        with:
          host: ssh.montyoh.dev
          username: ubuntu
          key_path: ./secrets-store/key/ec2-ssh-key
          script: |
            ENV_JSON='${{ steps.set_env_json.outputs.ENV_VARS_JSON }}'
            eval $(echo "$ENV_JSON" | jq -r '
              to_entries[]
              | select((.key | startswith("GITHUB_") | not) and (.key | startswith("RUNNER_") | not))
              | "export \(.key)=\"\(.value)\";"
            ' | tr -d '\n')

            mkdir -p /home/ubuntu/scripts /home/ubuntu/logs

            # aws CLI 없으면 설치 (OCI 인스턴스는 aarch64)
            which aws 2>/dev/null || (
              curl -s "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o /tmp/awscliv2.zip
              unzip -q /tmp/awscliv2.zip -d /tmp
              sudo /tmp/aws/install
              rm -rf /tmp/aws /tmp/awscliv2.zip
            )

            # 백업 스크립트에서 사용할 env 파일 (매 배포마다 최신 값으로 갱신)
            cat > /home/ubuntu/scripts/vikunja-backup.env << EOF
            VIKUNJA_BACKUP_USERNAME=$VIKUNJA_BACKUP_USERNAME
            VIKUNJA_BACKUP_PASSWORD=$VIKUNJA_BACKUP_PASSWORD
            VIKUNJA_R2_ACCESS_KEY=$VIKUNJA_R2_ACCESS_KEY
            VIKUNJA_R2_SECRET_KEY=$VIKUNJA_R2_SECRET_KEY
            VIKUNJA_R2_BUCKET=$VIKUNJA_R2_BUCKET
            CLOUDFLARE_R2_END_POINT=$CLOUDFLARE_R2_END_POINT
            EOF
            chmod 600 /home/ubuntu/scripts/vikunja-backup.env

            # 백업 스크립트 작성
            cat > /home/ubuntu/scripts/vikunja-backup.sh << 'SCRIPT'
            #!/bin/bash
            set -e
            source /home/ubuntu/scripts/vikunja-backup.env

            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="/tmp/vikunja-backup-$TIMESTAMP.zip"

            echo "[$(date)] Getting JWT token..."
            JWT=$(curl -s -X POST "https://vikunja.montyoh.dev/api/v1/login" \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"$VIKUNJA_BACKUP_USERNAME\",\"password\":\"$VIKUNJA_BACKUP_PASSWORD\"}" \
              | jq -r '.token')

            echo "[$(date)] Requesting export..."
            curl -s -X POST "https://vikunja.montyoh.dev/api/v1/user/export/request" \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              -d "{\"password\":\"$VIKUNJA_BACKUP_PASSWORD\"}"

            for i in $(seq 1 12); do
              sleep 10
              HTTP_CODE=$(curl -s -X POST "https://vikunja.montyoh.dev/api/v1/user/export/download" \
                -H "Authorization: Bearer $JWT" \
                -H "Content-Type: application/json" \
                -d "{\"password\":\"$VIKUNJA_BACKUP_PASSWORD\"}" \
                -o "$BACKUP_FILE" \
                -w "%{http_code}")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "[$(date)] Export ready."
                break
              fi
              echo "Not ready yet ($i/12), retrying..."
              rm -f "$BACKUP_FILE"
            done

            AWS_ACCESS_KEY_ID=$VIKUNJA_R2_ACCESS_KEY \
            AWS_SECRET_ACCESS_KEY=$VIKUNJA_R2_SECRET_KEY \
            aws s3 cp "$BACKUP_FILE" \
              "s3://$VIKUNJA_R2_BUCKET/backup/vikunja-backup-$TIMESTAMP.zip" \
              --endpoint-url "$CLOUDFLARE_R2_END_POINT" \
              --region auto

            rm -f "$BACKUP_FILE"
            echo "[$(date)] Backup complete: vikunja-backup-$TIMESTAMP.zip"
            SCRIPT
            chmod +x /home/ubuntu/scripts/vikunja-backup.sh

            # cron 중복 방지하며 등록 (매일 자정)
            (crontab -l 2>/dev/null | grep -v 'vikunja-backup.sh'; echo "0 0 * * * /home/ubuntu/scripts/vikunja-backup.sh >> /home/ubuntu/logs/vikunja-backup.log 2>&1") | crontab -
            echo "Cron registered."
