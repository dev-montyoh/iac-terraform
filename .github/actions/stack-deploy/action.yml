name: Stack Deploy
description: application-services 스택을 원격 Swarm 노드에 배포하는 composite action

# 사용 전제 (caller가 이 action 호출 전에 같은 job에서 미리 해둬야 함):
#   1. secrets-store를 ./secrets-store 경로로 checkout (SSH 키: ./secrets-store/key/ec2-ssh-key)
#   2. load-secrets 액션으로 시크릿을 $GITHUB_ENV 에 로드
#      -> 이 action은 secrets를 다시 로드하지 않고, 로드된 env를 그대로 재사용한다.
#
# 호출 예시:
#   - uses: dev-montyoh/iac-terraform/.github/actions/stack-deploy@master

runs:
  using: "composite"
  steps:
    # 모든 환경 변수를 JSON 문자열로 변환하여 변수에 저장
    # (caller가 load-secrets로 $GITHUB_ENV에 넣은 값들이 env 컨텍스트에 포함됨)
    - name: ENV to JSON
      id: set_env_json
      shell: bash
      run: |
        echo "ENV_VARS_JSON=$(echo '${{ toJSON(env) }}' | jq -c '.')" >> $GITHUB_OUTPUT

    # 스택 배포
    - name: Deploy stack
      uses: appleboy/ssh-action@v1
      env:
        DOCKER_REGISTRY_ACCESS_TOKEN: ${{ env.DOCKER_REGISTRY_ACCESS_TOKEN }}
        DOCKER_REGISTRY_USERNAME: ${{ github.repository_owner }}
      with:
        host: ssh.montyoh.dev
        username: ubuntu
        key_path: ./secrets-store/key/ec2-ssh-key
        envs: DOCKER_REGISTRY_ACCESS_TOKEN,DOCKER_REGISTRY_USERNAME
        script: |
          ENV_JSON='${{ steps.set_env_json.outputs.ENV_VARS_JSON }}'
          eval $(echo "$ENV_JSON" | jq -r '
            to_entries[]
            | select((.key | startswith("GITHUB_") | not) and (.key | startswith("RUNNER_") | not))
            | "export \(.key)=\"\(.value)\";"
          ' | tr -d '\n')

          if [ "$(docker info --format '{{.Swarm.LocalNodeState}}')" != "active" ]; then
            docker swarm init --advertise-addr "$(hostname -I | awk '{print $1}')"
          fi

          echo "$DOCKER_REGISTRY_ACCESS_TOKEN" | docker login ghcr.io -u $DOCKER_REGISTRY_USERNAME --password-stdin

          cd /home/ubuntu/app
          curl -L -o docker-compose.stack.yml https://raw.githubusercontent.com/$DOCKER_REGISTRY_USERNAME/iac-terraform/refs/heads/master/docker-compose.stack.yml
          docker stack deploy --with-registry-auth -c docker-compose.stack.yml application-services
